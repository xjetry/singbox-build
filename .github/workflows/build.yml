name: Build sing-box

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build.yml']

permissions:
  contents: write

concurrency:
  group: build-sing-box
  cancel-in-progress: false

env:
  # Upstream default tags plus with_v2ray_api for the V2Ray stats/handler gRPC API
  BUILD_TAGS: with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_v2ray_api

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.decide.outputs.targets }}
    steps:
      - name: Find latest release and pre-release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          stable="$(gh api repos/SagerNet/sing-box/releases/latest --jq .tag_name)"
          pre="$(gh api 'repos/SagerNet/sing-box/releases?per_page=50' --jq '[.[] | select(.prerelease)][0].tag_name // empty')"
          echo "latest stable: $stable, latest pre-release: ${pre:-none}"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"
          echo "pre=$pre" >> "$GITHUB_OUTPUT"

      - name: Skip tags already released here
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE: ${{ steps.latest.outputs.stable }}
          PRE: ${{ steps.latest.outputs.pre }}
        run: |
          set -euo pipefail
          candidates="$(jq -cn --arg s "$STABLE" --arg p "$PRE" \
            '[{tag: $s, prerelease: false}] + (if $p != "" and $p != $s then [{tag: $p, prerelease: true}] else [] end)')"
          targets='[]'
          while read -r item; do
            tag="$(jq -r .tag <<<"$item")"
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release $tag already exists, skipping"
            else
              targets="$(jq -c --argjson i "$item" '. + [$i]' <<<"$targets")"
            fi
          done < <(jq -c '.[]' <<<"$candidates")
          echo "targets to build: $targets"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.targets != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check.outputs.targets) }}
    steps:
      - name: Checkout sing-box ${{ matrix.tag }}
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ matrix.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Build
        env:
          TAG: ${{ matrix.tag }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p build dist

          for arch in amd64 arm64; do
            echo "::group::build linux/$arch"
            GOOS=linux GOARCH="$arch" go build -v -trimpath \
              -tags "$BUILD_TAGS" \
              -ldflags "-X github.com/sagernet/sing-box/constant.Version=$VERSION -s -w -buildid=" \
              -o "build/sing-box-$arch" ./cmd/sing-box
            echo "::endgroup::"
          done

          pack() {
            tar -C dist -czf "dist/$1.tar.gz" "$1"
            rm -r "dist/${1:?}"
          }

          for arch in amd64 arm64; do
            name="sing-box-$VERSION-linux-$arch"
            mkdir -p "dist/$name"
            install -m755 "build/sing-box-$arch" "dist/$name/sing-box"
            pack "$name"
          done

          name="sing-box-$VERSION-linux-universal"
          mkdir -p "dist/$name"
          install -m755 build/sing-box-amd64 "dist/$name/sing-box-amd64"
          install -m755 build/sing-box-arm64 "dist/$name/sing-box-arm64"
          cat > "dist/$name/sing-box" <<'EOF'
          #!/bin/sh
          # Dispatch to the binary matching the host CPU so one package serves both architectures
          dir="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          case "$(uname -m)" in
            x86_64 | amd64) exec "$dir/sing-box-amd64" "$@" ;;
            aarch64 | arm64) exec "$dir/sing-box-arm64" "$@" ;;
            *) echo "sing-box: unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          EOF
          chmod +x "dist/$name/sing-box"
          pack "$name"

          (cd dist && sha256sum ./*.tar.gz > checksums.sha256)
          ls -lh dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ matrix.tag }}
          PRERELEASE: ${{ matrix.prerelease }}
        run: |
          set -euo pipefail
          args=()
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "sing-box $TAG" \
            --notes "sing-box $TAG built with tags: \`$BUILD_TAGS\`

          Upstream release: https://github.com/SagerNet/sing-box/releases/tag/$TAG" \
            "${args[@]}" dist/*.tar.gz dist/checksums.sha256
